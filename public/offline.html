<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f20d14" />
    <title>ONE TEN Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101010;
        color: #fff;
        font-family: Inter, Arial, sans-serif;
      }
      main {
        width: min(420px, calc(100% - 40px));
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        background: #171717;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      img {
        width: 130px;
        height: auto;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }
      p {
        margin: 0;
        color: #d8d8d8;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 22px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #f20d14;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/logo-white.png" alt="ONE TEN" />
      <h1>You are offline</h1>
      <p>ONE TEN will reopen from cached pages and products when the connection comes back.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
